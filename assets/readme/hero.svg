<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="360" viewBox="0 0 1200 360" role="img" aria-labelledby="title desc">
  <title id="title">Veles, controlled web research for local models</title>
  <desc id="desc">A Rust MCP server that searches DuckDuckGo and reads public web pages, returning structured sources while keeping Firefox rendering opt-in.</desc>
  <rect width="1200" height="360" rx="20" fill="#171a22"/>
  <path d="M64 82H1136M64 294H1136" stroke="#404958" stroke-width="1"/>
  <text x="64" y="170" fill="#f4f2eb" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="88" font-weight="800" letter-spacing="-5">Veles<tspan fill="#ff7a34">.</tspan></text>
  <text x="64" y="224" fill="#bfc6d1" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="38">Controlled web research</text>
  <text x="64" y="264" fill="#bfc6d1" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="38">for local models.</text>
  <g transform="translate(726 104)">
    <rect width="410" height="150" rx="12" fill="#202530" stroke="#4f5968" stroke-width="2"/>
    <text x="34" y="66" fill="#ffb06a" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="38" font-weight="750">SEARCH</text>
    <path d="M183 55H235" stroke="#ff7a34" stroke-width="3"/>
    <path d="M229 48L244 55L229 62" fill="none" stroke="#ff7a34" stroke-width="3"/>
    <text x="260" y="66" fill="#84c089" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="38" font-weight="750">SOURCES</text>
  </g>
</svg>
